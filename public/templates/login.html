        <main class="login">
            <div class="container">
                <img src="../static/img/login/main.jpg" alt="Main image" class="login__img">
                <div class="login-cont">
                    <div class="login-forms">
                        <div class="login-boxes">
                            <div class="login-box">
                                <div class="login-top">
                                    <h3 class="login-top__title">
                                        Войти в аккаунт
                                    </h3>
                                    <span class="login-top__text">
                                        Напишите данные снизу
                                    </span>
                                </div>
                                <div class="login-error signin-error">
                                    <span>
                                        Ошибка входа: 
                                    </span>
                                    <span class="login-error__message signin-error__message">
                                        
                                    </span>
                                </div>
                                <form class="login-form login-signin"  id="signinForm" action="#">
                                    <input type="email" id="email" name="email" placeholder="Email" required>
                                    <input type="password" id="password" name="password" placeholder="Пароль" required>
                                    <input type="submit" value="Войти">
                                </form>
                                <div class="login-swipe">
                                    <span class="login-swipe__text">
                                        Хотите создать аккаунт?
                                    </span>
                                    <button class="login-swipe__btn login-swipe__btn--toSignup">
                                        Создать
                                    </button>
                                </div>
                            </div>
                            <div class="login-box">
                                <div class="login-top">
                                    <h3 class="login-top__title">
                                        Регистрация
                                    </h3>
                                    <span class="login-top__text">
                                        Напишите данные снизу
                                    </span>
                                </div>
                                <div class="login-error signup-error">
                                    <span>
                                        Ошибка регистраций: 
                                    </span>
                                    <span class="login-error__message signup-error__message">
                                        
                                    </span>
                                </div>
                                <form class="login-form login-signup"  id="signupForm" action="#">
                                    <input type="text" id="name" name="name" placeholder="Имя" required>
                                    <input type="email" id="email" name="email" placeholder="Email" required>
                                    <input type="password" id="password" name="password" placeholder="Пароль" required>
                                    <input type="submit" value="Зарегистрироваться">
                                </form>
                                <div class="login-swipe">
                                    <span class="login-swipe__text">
                                        Уже имеете аккаунт?
                                    </span>
                                    <button class="login-swipe__btn login-swipe__btn--toSignin">
                                        Войти
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
